<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CODE-AP</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

input{
padding:10px;
width:60%;
border-radius:8px;
border:none;
margin:20px;
}

.code{
background:#1e293b;
margin:20px auto;
padding:15px;
width:70%;
border-radius:10px;
}

button{
background:#22c55e;
border:none;
padding:10px;
color:white;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

<body>

<h1>🔥 CODE-AP | Mis Códigos 🔥</h1>

<input type="text" id="buscador"
placeholder="🔍 Buscar código..."
onkeyup="buscarCodigo()">

<div class="code">
<pre id="c1">
console.log("Hola Mundo");
</pre>
<button onclick="copiar('c1')">Copiar</button>
</div>

<div class="code">
<pre id="c2">
print("Codigo Python")
</pre>
<button onclick="copiar('c2')">Copiar</button>
</div>

<div class="code">
<h3>Mensaje JavaScript</h3>

<pre id="c3">
alert("Bienvenido a CODE-AP");
</pre>

<button onclick="copiar('c3')">Copiar</button>
</div>
  
<script>

function copiar(id){
let texto=document.getElementById(id).innerText;
navigator.clipboard.writeText(texto);
alert("Código copiado ✅");
}

function buscarCodigo(){
let input=document.getElementById("buscador").value.toLowerCase();
let bloques=document.getElementsByClassName("code");

for(let i=0;i<bloques.length;i++){
let texto=bloques[i].innerText.toLowerCase();

if(texto.includes(input)){
bloques[i].style.display="block";
}else{
bloques[i].style.display="none";
}
}
}

</script>

</body>
</html>
